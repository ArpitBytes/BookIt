version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bookit-db
    environment:
      POSTGRES_USER: ${DB_USER:-bookit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bookit123}
      POSTGRES_DB: ${DB_NAME:-bookit_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookit"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bookit-server
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bookit}:${DB_PASSWORD:-bookit123}@db:5432/${DB_NAME:-bookit_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
